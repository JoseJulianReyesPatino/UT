<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #f8fafc;
        font-family: Inter, system-ui, sans-serif;
      }
      .card {
        max-width: 420px;
        width: 90%;
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(15, 23, 42, 0.92);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.24);
        text-align: center;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: 2rem;
      }
      p {
        margin: 0 0 1.5rem;
        color: #cbd5e1;
        line-height: 1.7;
      }
      a {
        display: inline-block;
        text-decoration: none;
        color: #0f766e;
        border: 1px solid #0f766e;
        padding: 0.75rem 1.25rem;
        border-radius: 9999px;
        transition: background 0.2s ease;
      }
      a:hover {
        background: #0f766e;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sin conexión</h1>
      <p>La aplicación no puede cargar en este momento porque no hay conexión a internet. Revisa tu red y vuelve a intentarlo.</p>
      <a href="/">Intentar de nuevo</a>
    </div>
  </body>
</html>
